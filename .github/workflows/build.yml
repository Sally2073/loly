name: Build Loly Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          echo "Removing old Theos if exists..."
          sudo rm -rf /opt/theos
          
          echo "Cloning Theos..."
          sudo git clone --recursive https://github.com/theos/theos.git /opt/theos
          
          echo "Setting permissions..."
          sudo chown -R $(whoami) /opt/theos
          sudo chmod -R 755 /opt/theos
          
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          echo "THEOS_MAKE_PATH=/opt/theos/makefiles" >> $GITHUB_ENV

      - name: Build Tweak
        run: |
          make clean
          make package

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: loly-tweak
          path: packages/*.deb
          retention-days: 7

      - name: Show Build Result
        run: ls -la packages/
