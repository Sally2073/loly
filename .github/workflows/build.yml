name: Build Loly Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install make ldid xz
          echo "/opt/homebrew/opt/make/libexec/gnubin" >> $GITHUB_PATH

      - name: Cache Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: /opt/theos
          key: theos-cache-v2-${{ runner.os }}
          restore-keys: theos-cache-v2-

      - name: Setup Theos
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone --recursive https://github.com/theos/theos.git /opt/theos
          sudo chown -R $(whoami) /opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          echo "THEOS_MAKE_PATH=/opt/theos/makefiles" >> $GITHUB_ENV

      - name: Setup Theos (Cached)
        if: steps.cache-theos.outputs.cache-hit == 'true'
        run: |
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          echo "THEOS_MAKE_PATH=/opt/theos/makefiles" >> $GITHUB_ENV

      - name: Build Tweak
        run: |
          make clean
          make package

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: loly-tweak
          path: packages/*.deb
          retention-days: 7

      - name: Show Result
        run: ls -la packages/
