name: Build Loly Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Theos using Official Action
        uses: Randomblock1/theos-action@v1
        with:
          sdk: 'iPhoneOS14.5.sdk'   # يمكنك تغييره حسب احتياجك

      - name: Build Tweak
        run: |
          make clean
          make package

      - name: Upload DEB File
        uses: actions/upload-artifact@v4
        with:
          name: loly-tweak
          path: packages/*.deb
          retention-days: 7

      - name: Show Build Status
        run: ls -la packages/
